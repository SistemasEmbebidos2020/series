<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamVault — Encuentra tu Serie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --card: #131822;
    --card-hover: #1a2235;
    --border: #1e2a3a;
    --accent: #e63946;
    --accent2: #ff6b35;
    --accent-glow: rgba(230,57,70,0.3);
    --text: #e8eaf0;
    --text-muted: #6b7a99;
    --text-dim: #3a4560;
    --gold: #ffd166;
    --green: #06d6a0;
    --blue: #118ab2;
    --purple: #7b2d8b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }

  .logo span {
    color: var(--text-muted);
    -webkit-text-fill-color: var(--text-dim);
    font-size: 0.9rem;
    font-family: 'DM Mono', 'Courier New', monospace;
    letter-spacing: 0.2em;
    margin-left: 0.5rem;
    vertical-align: middle;
  }

  nav {
    display: flex;
    gap: 0.25rem;
    align-items: center;
  }

  nav a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  nav a:hover, nav a.active {
    color: var(--text);
    background: var(--card);
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 5rem 2rem 4rem;
    text-align: center;
    overflow: hidden;
  }

  .hero-glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(230,57,70,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
    font-size: clamp(3rem, 8vw, 6.5rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    margin-bottom: 1.2rem;
  }

  .hero h1 .line1 { display: block; color: var(--text); }
  .hero h1 .line2 {
    display: block;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 1.05rem;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.65;
  }

  /* SEARCH BAR */
  .search-container {
    max-width: 680px;
    margin: 0 auto 1.5rem;
    position: relative;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 0.5rem 0.5rem 0.5rem 1.2rem;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .search-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .search-icon {
    color: var(--text-muted);
    margin-right: 0.8rem;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .search-wrap input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    font-size: 1rem;
    font-weight: 400;
  }

  .search-wrap input::placeholder { color: var(--text-dim); }

  .btn-search {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.65rem 1.4rem;
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-search:hover { opacity: 0.9; transform: scale(1.02); }

  /* FILTERS */
  .filters {
    max-width: 900px;
    margin: 0 auto 4rem;
    padding: 0 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    justify-content: center;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.45rem 0.75rem;
  }

  .filter-group label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .filter-group select {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    min-width: 120px;
  }

  .filter-group select option { background: var(--card); }

  .tags-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    max-width: 900px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
  }

  .tag {
    padding: 0.4rem 1rem;
    border-radius: 50px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    background: var(--card);
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .tag:hover, .tag.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(230,57,70,0.08);
  }

  .tag.all.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border-color: transparent;
  }

  /* SECTION TITLE */
  .section-title {
    max-width: 1400px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title h2 {
    font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .section-title h2 span {
    color: var(--accent);
  }

  .view-all {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: color 0.2s;
  }
  .view-all:hover { color: var(--accent); }

  /* SERIES GRID */
  .grid-container {
    max-width: 1400px;
    margin: 0 auto 3rem;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 1.2rem;
  }

  .series-card {
    border-radius: 12px;
    overflow: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }

  .series-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px var(--accent-glow);
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface);
  }

  .card-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    background: linear-gradient(135deg, var(--surface), var(--card));
    color: var(--text-dim);
  }

  .card-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card-badge.new { background: var(--green); color: #000; }
  .card-badge.popular { background: var(--gold); color: #000; }
  .card-badge.hd { background: var(--blue); }

  .card-rating {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    border-radius: 6px;
    padding: 0.2rem 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 0.2rem;
  }

  .card-info {
    padding: 0.75rem;
  }

  .card-title {
    font-weight: 600;
    font-size: 0.88rem;
    margin-bottom: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .card-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .card-genre {
    background: var(--surface);
    border-radius: 4px;
    padding: 0.1rem 0.4rem;
    font-size: 0.68rem;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(8,10,15,0.95) 0%, rgba(8,10,15,0.3) 50%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1rem;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .series-card:hover .card-overlay { opacity: 1; }

  .overlay-btns {
    display: flex;
    gap: 0.5rem;
  }

  .btn-play {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.6rem;
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    transition: opacity 0.2s;
  }

  .btn-play:hover { opacity: 0.9; }

  .btn-info {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-family: 'DM Sans', 'Segoe UI', Arial, sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-info:hover { background: rgba(255,255,255,0.2); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 950px;
    max-height: 90vh;
    overflow-y: auto;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-track { background: var(--surface); }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .modal-hero {
    position: relative;
    height: 320px;
    overflow: hidden;
    border-radius: 20px 20px 0 0;
  }

  .modal-backdrop {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(2px) brightness(0.5);
  }

  .modal-backdrop-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, #1a0a0a, #0a0a1a);
  }

  .modal-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--card) 0%, transparent 60%);
    display: flex;
    align-items: flex-end;
    padding: 2rem;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--accent); border-color: transparent; }

  .modal-title-area { width: 100%; }
  .modal-series-title {
    font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 0.03em;
    line-height: 1;
    margin-bottom: 0.5rem;
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
  }

  .modal-tag {
    background: rgba(230,57,70,0.2);
    color: var(--accent);
    border: 1px solid rgba(230,57,70,0.3);
    border-radius: 4px;
    padding: 0.2rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .modal-body {
    padding: 1.5rem 2rem 2rem;
  }

  .modal-meta {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .meta-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  .meta-value {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .meta-value.rating { color: var(--gold); }
  .meta-value.new { color: var(--green); }

  .modal-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-bottom: 2rem;
    max-width: 680px;
  }

  /* VIDEO PLAYER */
  .player-section {
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  .player-header {
    background: var(--surface);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-wrap: gap;
    gap: 0.75rem;
  }

  .player-title {
    font-size: 0.85rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .player-title .ep-badge {
    background: var(--accent);
    color: white;
    font-size: 0.7rem;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-family: 'DM Mono', 'Courier New', monospace;
  }

  .player-controls-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .res-selector {
    display: flex;
    gap: 0.3rem;
  }

  .res-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 5px;
    padding: 0.25rem 0.6rem;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .res-btn:hover, .res-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .video-wrapper {
    position: relative;
    padding-top: 56.25%;
    background: #000;
  }

  .video-wrapper video, .video-wrapper iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: radial-gradient(ellipse at center, #1a0505 0%, #000 70%);
  }

  .play-big {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 40px rgba(230,57,70,0.4);
    border: none;
    color: white;
  }

  .play-big:hover { transform: scale(1.1); box-shadow: 0 0 60px rgba(230,57,70,0.6); }

  .now-playing-text {
    color: var(--text-muted);
    font-size: 0.85rem;
    text-align: center;
  }

  .now-playing-text strong { color: var(--text); }

  /* EPISODES */
  .episodes-section { margin-bottom: 1.5rem; }

  .episodes-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .episodes-header h3 {
    font-family: 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.05em;
  }

  .season-tabs {
    display: flex;
    gap: 0.4rem;
  }

  .season-tab {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 7px;
    padding: 0.35rem 0.9rem;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .season-tab:hover, .season-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .episodes-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 280px;
    overflow-y: auto;
    padding-right: 0.3rem;
  }

  .episodes-list::-webkit-scrollbar { width: 4px; }
  .episodes-list::-webkit-scrollbar-track { background: transparent; }
  .episodes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .episode-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .episode-row:hover, .episode-row.playing {
    border-color: var(--accent);
    background: rgba(230,57,70,0.05);
  }

  .episode-row.playing .ep-num { color: var(--accent); }

  .ep-num {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    width: 32px;
    flex-shrink: 0;
    font-weight: 600;
  }

  .ep-details { flex: 1; min-width: 0; }
  .ep-name {
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }

  .ep-desc {
    font-size: 0.72rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ep-duration {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .ep-actions {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .ep-btn {
